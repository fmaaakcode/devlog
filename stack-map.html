<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stack Map</title>
<style>
  :root {
    --bg: #161718;
    --bg2: #1B1C1D;
    --border: #363737;
    --text: #EEEEEE;
    --text2: #777777;
    --accent: #118ab2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }
  header {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 0 16px;
    height: 48px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    direction: ltr;
  }
  header a.back {
    color: var(--text2);
    text-decoration: none;
    font-size: 13px;
  }
  header a.back:hover { color: var(--text); }
  header h1 {
    font-size: 14px;
    font-weight: 500;
    flex: 1;
    color: var(--text);
  }
  header .controls { display: flex; gap: 8px; }
  header button {
    background: var(--bg2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  header button:hover { border-color: var(--text2); }
  header select {
    background: var(--bg2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
  }
  header select:hover { border-color: var(--text2); }
  header input[type="search"] {
    background: var(--bg2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12px;
    font-family: inherit;
    width: 170px;
    direction: rtl;
  }
  header input[type="search"]:focus { outline: none; border-color: var(--accent); }
  main {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }
  canvas.dragging { cursor: grabbing; }
  #status {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--text2);
    font-size: 13px;
    text-align: center;
  }
  #tooltip {
    position: absolute;
    pointer-events: none;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 12px;
    color: var(--text);
    display: none;
    z-index: 10;
    max-width: 260px;
  }
  #tooltip .t-path { color: var(--text2); font-size: 11px; margin-top: 2px; }
  #tooltip .t-desc { margin-top: 4px; color: var(--text); }
</style>
</head>
<body>
<header>
  <a class="back" href="/">← الرئيسية</a>
  <h1 id="title">Stack Map</h1>
  <span id="stackAge" style="font-size:12px;color:var(--text2)"></span>
  <div class="controls">
    <input id="searchBox" type="search" placeholder="بحث بالاسم…" autocomplete="off"
           title="يوهج المطابقات ويقفز إليها — Enter يركّز على الأفضل">
    <button id="regenStack" title="إعادة توليد DEVLOG_STACK.md من الكود الحالي" style="display:none">تحديث الخريطة</button>
    <select id="layoutMode" title="نوع الترتيب">
      <option value="radial">شعاعي (افتراضي)</option>
      <option value="force">قوى (عناقيد)</option>
      <option value="layered">طبقي (call graph)</option>
    </select>
    <button id="toggleActivity" title="إبراز الملفات النشطة مؤخراً">نشاط: ON</button>
    <button id="reLayout">إعادة ترتيب تلقائي</button>
  </div>
</header>
<main>
  <canvas id="map"></canvas>
  <div id="status">تحميل…</div>
  <div id="tooltip"></div>
</main>
<script src="/assets/stack-map.js"></script>
</body>
</html>
