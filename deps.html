<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مكتبات المشروع</title>
<style>
  :root {
    --pink: #ef476f;
    --gold: #ffd166;
    --emerald: #06d6a0;
    --blue: #118ab2;
    --bg: #161718;
    --bg3: #1B1C1D;
    --border: #363737;
    --text: #EEEEEE;
    --text2: #9A9A9A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    padding: 12px 22px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  header a.back { color: var(--text2); text-decoration: none; font-size: 13px; }
  header a.back:hover { color: var(--text); }
  header h1 { font-size: 15px; font-weight: 600; }
  header h1 span { color: var(--emerald); }
  #coverage { font-size: 12px; color: var(--text2); }
  #coverage b { color: var(--gold); font-weight: 600; }
  #search {
    margin-inline-start: auto;
    background: var(--bg3); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 6px 12px; font-size: 13px; font-family: inherit;
    width: 220px;
  }
  #search:focus { outline: none; border-color: var(--blue); }
  main { padding: 18px 22px; display: grid; gap: 10px; max-width: 980px; margin: 0 auto; }
  .card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
  }
  .card.danger { border-color: var(--pink); }
  .card.stale { border-color: #4a3a00; }
  .row1 { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; direction: ltr; justify-content: flex-end; }
  .name { font-family: 'Cascadia Code', Consolas, monospace; font-size: 14px; }
  .name a { color: var(--text); text-decoration: none; }
  .name a:hover { color: var(--blue); }
  .ver { font-family: Consolas, monospace; font-size: 12px; color: var(--emerald); }
  .latest { font-family: Consolas, monospace; font-size: 12px; color: var(--gold); }
  .badge {
    font-size: 10.5px; padding: 1px 7px; border-radius: 999px;
    border: 1px solid var(--border); color: var(--text2);
  }
  .badge.vuln { color: var(--pink); border-color: var(--pink); font-weight: 700; }
  .purpose { margin-top: 8px; font-size: 13.5px; line-height: 1.6; }
  .purpose.missing { color: var(--text2); font-style: italic; }
  .desc { margin-top: 4px; font-size: 12px; color: var(--text2); direction: ltr; text-align: right; }
  .hint {
    margin-top: 4px; font-size: 11.5px; color: var(--text2);
    font-family: Consolas, monospace; direction: ltr; text-align: right;
  }
  #status { padding: 40px; text-align: center; color: var(--text2); font-size: 14px; }
</style>
</head>
<body>
<header>
  <a class="back" href="/">&rarr; الداشبورد</a>
  <h1>مكتبات <span id="projName"></span></h1>
  <span id="coverage"></span>
  <input id="search" type="search" placeholder="ابحث باسم المكتبة أو الغرض…">
</header>
<div id="status">جارِ التحميل…</div>
<main id="list" hidden></main>
<script type="module" src="/assets/deps.js"></script>
</body>
</html>
